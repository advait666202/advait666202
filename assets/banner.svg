<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Deep space background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#111530"/>
      <stop offset="100%" stop-color="#0a0e27"/>
    </linearGradient>

    <!-- Animated name gradient — cycles cyan → purple → pink -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF">
        <animate attributeName="stop-color" values="#00D4FF;#8B5CF6;#EC4899;#00D4FF" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#8B5CF6">
        <animate attributeName="stop-color" values="#8B5CF6;#EC4899;#00D4FF;#8B5CF6" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#EC4899">
        <animate attributeName="stop-color" values="#EC4899;#00D4FF;#8B5CF6;#EC4899" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Grid pattern overlay -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#8B5CF6" stroke-width="0.5" opacity="0.12"/>
    </pattern>

    <!-- Glow filter for the name -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- Decorative circuit trace: top-left -->
  <g stroke="#00D4FF" stroke-width="1.2" fill="none" opacity="0.5">
    <path d="M 0 55 L 90 55 L 115 80 L 220 80"/>
    <circle cx="90" cy="55" r="3" fill="#00D4FF"/>
    <circle cx="115" cy="80" r="3" fill="#00D4FF"/>
    <circle cx="220" cy="80" r="4" fill="none"/>
  </g>

  <!-- Decorative circuit trace: bottom-right -->
  <g stroke="#EC4899" stroke-width="1.2" fill="none" opacity="0.5">
    <path d="M 1200 265 L 1110 265 L 1085 240 L 980 240"/>
    <circle cx="1110" cy="265" r="3" fill="#EC4899"/>
    <circle cx="1085" cy="240" r="3" fill="#EC4899"/>
    <circle cx="980" cy="240" r="4" fill="none"/>
  </g>

  <!-- Floating neural nodes with pulsing opacity -->
  <g fill="#8B5CF6">
    <circle cx="90" cy="220" r="2.5">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="90" r="2.5">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="140" r="2">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1155" cy="180" r="2">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="270" r="2" fill="#00D4FF">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="55" r="2" fill="#00FF88">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Corner brackets: futuristic HUD frame -->
  <g stroke="#00D4FF" stroke-width="1.5" fill="none" opacity="0.55">
    <path d="M 20 20 L 20 45 M 20 20 L 45 20"/>
    <path d="M 1180 20 L 1180 45 M 1180 20 L 1155 20"/>
    <path d="M 20 300 L 20 275 M 20 300 L 45 300"/>
    <path d="M 1180 300 L 1180 275 M 1180 300 L 1155 300"/>
  </g>

  <!-- Terminal window -->
  <g transform="translate(90, 55)">
    <!-- Outer glow ring -->
    <rect x="-2" y="-2" width="1024" height="214" rx="10"
          fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.35"/>

    <!-- Main window body -->
    <rect x="0" y="0" width="1020" height="210" rx="8"
          fill="#000913" fill-opacity="0.75"
          stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.65"/>

    <!-- Title bar -->
    <path d="M 0 8 Q 0 0 8 0 L 1012 0 Q 1020 0 1020 8 L 1020 32 L 0 32 Z"
          fill="#1a1f3a" fill-opacity="0.95"/>
    <line x1="0" y1="32" x2="1020" y2="32" stroke="#8B5CF6" stroke-width="0.5" opacity="0.4"/>

    <!-- Traffic lights (macOS-style) -->
    <circle cx="20" cy="16" r="6" fill="#FF5F56"/>
    <circle cx="42" cy="16" r="6" fill="#FFBD2E"/>
    <circle cx="64" cy="16" r="6" fill="#27C93F"/>

    <!-- Title bar text -->
    <text x="510" y="20" text-anchor="middle"
          font-family="'JetBrains Mono', 'Fira Code', 'Menlo', monospace"
          font-size="12" fill="#6B7280" font-weight="500">
      advait_dalvi.dev — zsh — 100×30
    </text>

    <!-- Line 1: shell prompt -->
    <text x="22" y="62" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14">
      <tspan fill="#00FF88" font-weight="700">➜</tspan>
      <tspan fill="#00D4FF" dx="8" font-weight="600">~/advait</tspan>
      <tspan fill="#6B7280" dx="8">git:(</tspan><tspan fill="#EC4899">main</tspan><tspan fill="#6B7280">)</tspan>
      <tspan fill="#FFBD2E" dx="6">✗</tspan>
    </text>

    <!-- Line 2: command -->
    <text x="22" y="84" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14">
      <tspan fill="#6B7280">$</tspan>
      <tspan fill="#E5E7EB" dx="6">./init</tspan>
      <tspan fill="#8B5CF6" dx="6">--profile</tspan>
      <tspan fill="#00D4FF" dx="6">--verbose</tspan>
    </text>

    <!-- Main name — animated gradient with glow -->
    <text x="22" y="142" font-family="'JetBrains Mono', 'Fira Code', monospace"
          font-size="42" font-weight="800" fill="url(#nameGrad)" filter="url(#glow)"
          letter-spacing="1">
      ADVAIT DALVI
    </text>

    <!-- Line 4: role tagline -->
    <text x="22" y="172" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14">
      <tspan fill="#6B7280">// </tspan>
      <tspan fill="#E5E7EB" font-weight="500">AI Business Analyst </tspan>
      <tspan fill="#8B5CF6">@</tspan>
      <tspan fill="#00D4FF" dx="4">SP Jain Dubai</tspan>
    </text>

    <!-- Line 5: mission with blinking cursor -->
    <text x="22" y="196" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14">
      <tspan fill="#00FF88" font-weight="700">></tspan>
      <tspan fill="#6B7280" dx="6">STATUS:</tspan>
      <tspan fill="#E5E7EB" dx="6">Turning</tspan>
      <tspan fill="#00D4FF" dx="4">AI</tspan>
      <tspan fill="#E5E7EB" dx="4">into</tspan>
      <tspan fill="#EC4899" dx="4">Business Impact</tspan>
    </text>

    <!-- Blinking cursor -->
    <rect x="405" y="185" width="9" height="14" fill="#00D4FF">
      <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- HUD-style tags in corners -->
  <g font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="10" font-weight="600">
    <text x="1170" y="18" text-anchor="end" fill="#00D4FF" opacity="0.6">[ BUILD_v2.7 ]</text>
    <text x="30" y="313" fill="#00FF88" opacity="0.75">
      ◉ ONLINE
      <animate attributeName="opacity" values="0.75;0.35;0.75" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="1170" y="313" text-anchor="end" fill="#EC4899" opacity="0.6">MAIB • 2025 → 2027</text>
  </g>
</svg>
